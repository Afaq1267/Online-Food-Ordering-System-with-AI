<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Food Ordering System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            max-width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #ff6b35;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #e55a2b;
        }
        
        .flash {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .flash-success {
            background: #d4edda;
            color: #155724;
        }
        
        .flash-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .flash-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #ff6b35;
            text-decoration: none;
        }
        
        .food-icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .step {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="food-icon">🔐❓</div>
        <h2>Reset Password</h2>
        <div class="subtitle">Answer your security question to reset password</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="input-group">
                <label>Enter Your Username</label>
                <input type="text" name="username" placeholder="Your username" required>
            </div>
            
            <button type="submit" class="btn">Verify Identity</button>
        </form>
        
        <div class="step">Step 1 of 2</div>
        <div class="back-link">
            <a href="/login">← Back to Login</a>
        </div>
    </div>
</body>
</html>
